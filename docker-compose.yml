services:
  mongo:
    image: mongo:8
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db

  platform-api:
    build:
      context: ./platform/backend
      dockerfile: Dockerfile
    image: edtech-platform-api:latest
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      APP_MONGO_URL: ${APP_MONGO_URL:-mongodb://mongo:27017}
      APP_MONGO_DB: ${APP_MONGO_DB:-edtech_platform}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-change-me-in-prod}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    ports:
      - "${API_PORT:-8080}:8080"

  platform-web:
    build:
      context: ./platform/web
      dockerfile: Dockerfile
    image: edtech-platform-web:latest
    restart: unless-stopped
    depends_on:
      - platform-api
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080/api/v1}
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./output/videos:/app/public/videos:ro

  repo2course:
    build:
      context: .
      dockerfile: Dockerfile
    image: repo2course:latest
    environment:
      REPO_SOURCE: ${REPO_SOURCE:-/work/repo}
      OUTPUT_DIR: ${OUTPUT_DIR:-/work/output}
      MAX_SNIPPETS: ${MAX_SNIPPETS:-4}
      MAX_LINES: ${MAX_LINES:-120}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GENERATE_VIDEOS: ${GENERATE_VIDEOS:-true}
      NARRATION_STYLES: ${NARRATION_STYLES:-hindi-teacher-simple,english-neutral}
      TTS_VOICE: ${TTS_VOICE:-}
      TTS_VOICE_MAP: ${TTS_VOICE_MAP:-}
    volumes:
      - ${LOCAL_REPO_PATH:-.}:/work/repo:ro
      - ${LOCAL_OUTPUT_PATH:-./output}:/work/output

  preview:
    image: node:22-alpine
    working_dir: /app
    command: sh -lc "npx --yes http-server /app -p ${FRONTEND_PORT:-4173} -c-1"
    ports:
      - "${FRONTEND_PORT:-4173}:${FRONTEND_PORT:-4173}"
    volumes:
      - ./:/app:ro

volumes:
  mongo-data:
